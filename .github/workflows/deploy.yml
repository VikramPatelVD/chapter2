name: Build and Deploy
on:
push:
branches: [main]
jobs:
build-and-deploy:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v3
- name: Setup Node.js
uses: actions/setup-node@v3
with:
node-version: '20'
- name: Setup .NET
uses: actions/setup-dotnet@v3
with:
dotnet-version: '10.0.x'
- name: Install React dependencies
working-directory: frontend
run: npm install
- name: Build React app
working-directory: frontend
run: npm run build
- name: Copy React build into Backend wwwroot
run: |
mkdir -p Backend/wwwroot
cp -r frontend/build/* Backend/wwwroot/
- name: Publish .NET Backend
run: dotnet publish Backend/Backend.csproj -c Release -o ./publish
- name: Deploy via FTP to Plesk
uses: SamKirkland/FTP-Deploy-Action@v4.3.4
with:
server: ${{ secrets.FTP_HOST }}
username: ${{ secrets.FTP_USER }}
password: ${{ secrets.FTP_PASS }}
local-dir: ./publish/
server-dir: /cc.combinedcourier.com/